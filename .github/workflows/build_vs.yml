name: VS2026 build

on: push

jobs:
  build:
    name: VS2026
    runs-on: windows-2025-vs2026
    steps:
      - name: Use GitHub mirror for Eigen submodule
        shell: bash
        run: |
          # score pins 3rdparty/eigen to gitlab.com, which is slow/flaky from
          # GitHub runners. The eigen-mirror/eigen GitHub repo preserves the same
          # commit SHAs, so redirect the submodule fetch there.
          git config --global url."https://github.com/eigen-mirror/eigen".insteadOf "https://gitlab.com/libeigen/eigen"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout dependencies
        uses: actions/checkout@v6
        with:
          repository: ossia/score
          submodules: "recursive"
          path: score

      - name: Checkout Max SDK
        uses: actions/checkout@v6
        with:
          repository: jcelerier/max-sdk-base
          submodules: "recursive"
          path: max-sdk-base

      - name: Checkout TouchDesigner SDK
        uses: actions/checkout@v6
        with:
          repository: jcelerier/CustomOperatorSamples
          ref: add-pop-headers
          path: touchdesigner-sdk

      - name: Install dependencies
        shell: bash
        run: |
          ${{ matrix.config.dependencies }}

      - name: Download SDK
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/ossia/score/master/tools/fetch-sdk.sh > fetch-sdk.sh
          chmod +x ./fetch-sdk.sh
          ./fetch-sdk.sh

      - name: Build debug
        shell: bash
        run: |
          mkdir build-debug
          cd build-debug

          export MAX_SDK=$PWD/../max-sdk-base
          export TD_SDK=$PWD/../touchdesigner-sdk
          export SDK_3RDPARTY=$PWD/../score/3rdparty
          export VERBOSE=1
          export PATH=/c/ossia-sdk-x86_64/cmake/bin:$PATH
          cmake --version
          which cmake
          find /c/ossia-sdk-x86_64 -name cmake.exe

          cmake .. \
            -DBOOST_ROOT=/c/ossia-sdk-x86_64/boost \
            -Dpybind11_DIR=$SDK_3RDPARTY/libossia/3rdparty/pybind11 \
            -DAVND_MAXSDK_PATH=$MAX_SDK \
            -DTOUCHDESIGNER_SDK_PATH=$TD_SDK \
            -DVST3_SDK_ROOT=$SDK_3RDPARTY/vst3 \
            -DCMAKE_PREFIX_PATH="$SDK_3RDPARTY/libpd/pure-data/src" \
            -G "Visual Studio 18 2026"

          cmake --build . --config Debug

      - name: Test debug
        shell: bash
        run: |
          cd build-debug
          cmake --build . --target RUN_TESTS

      - name: Build release
        shell: bash
        run: |
          mkdir build-release
          cd build-release

          export MAX_SDK=$PWD/../max-sdk-base
          export TD_SDK=$PWD/../touchdesigner-sdk
          export SDK_3RDPARTY=$PWD/../score/3rdparty
          export VERBOSE=1
          export PATH=/c/ossia-sdk-x86_64/cmake/bin:$PATH

          cmake .. \
            -DBOOST_ROOT=/c/ossia-sdk-x86_64/boost \
            -Dpybind11_DIR=$SDK_3RDPARTY/libossia/3rdparty/pybind11 \
            -DAVND_MAXSDK_PATH=$MAX_SDK \
            -DTOUCHDESIGNER_SDK_PATH=$TD_SDK \
            -DVST3_SDK_ROOT=$SDK_3RDPARTY/vst3 \
            -DCMAKE_PREFIX_PATH="$SDK_3RDPARTY/libpd/pure-data/src" \
            -G "Visual Studio 18 2026"

          cmake --build . --config Release

      - name: Test release
        shell: bash
        run: |
          cd build-release
          cmake --build . --config Release --target RUN_TESTS
