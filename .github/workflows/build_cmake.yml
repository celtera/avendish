name: CMake build

on: push

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Windows",
              os: windows-latest,
              path: "/c/ossia-sdk-x86_64/llvm/bin",
              common_flags: "-GNinja \
                             -DCMAKE_C_COMPILER=c:/ossia-sdk-x86_64/llvm/bin/clang.exe \
                             -DCMAKE_CXX_COMPILER=c:/ossia-sdk-x86_64/llvm/bin/clang++.exe \
                             -DCMAKE_EXE_LINKER_FLAGS=\"-fuse-ld=c:/ossia-sdk-x86_64/llvm/bin/ld.lld.exe\" \
                             -DCMAKE_SHARED_LINKER_FLAGS=\"-fuse-ld=c:/ossia-sdk-x86_64/llvm/bin/ld.lld.exe\" \
                             -DCMAKE_MODULE_LINKER_FLAGS=\"-fuse-ld=c:/ossia-sdk-x86_64/llvm/bin/ld.lld.exe\" ",
              debug_flags: "-DCMAKE_BUILD_TYPE=Debug",
              release_flags: "-DCMAKE_BUILD_TYPE=Release",
              build_flags: "",
              dependencies: "choco install -y ninja",
              sdk: "/c/ossia-sdk-x86_64",
              pre_build: ""
            }
          - {
              name: "Ubuntu (clang)",
              os: ubuntu-24.04,
              path: "/opt/ossia-sdk-x86_64/llvm/bin",
              common_flags: "-DCMAKE_C_COMPILER=/usr/bin/clang-22 \
                             -DCMAKE_CXX_COMPILER=/usr/bin/clang++-22 \
                             -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld-22 \
                             -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld-22 \
                             -DCMAKE_MODULE_LINKER_FLAGS=-fuse-ld=lld-22",
              debug_flags: "-DCMAKE_BUILD_TYPE=Debug",
              release_flags: "-DCMAKE_BUILD_TYPE=Release",
              build_flags: "",
              dependencies: "sudo apt update ; \
                             sudo apt install lsb-release wget software-properties-common ; \
                             curl -L https://apt.llvm.org/llvm.sh > llvm.sh ; \
                             chmod +x ./llvm.sh ; \
                             sudo ./llvm.sh 22 ; \
                             sudo apt update ; \
                             sudo apt install ninja-build clang-22 lld-22 libc++-22-dev libc++abi-22-dev \
                                              libx11-dev libxrandr-dev libxext-dev libxcursor-dev xvfb",
              sdk: "/opt/ossia-sdk-x86_64",
              pre_build: ""
            }
          - {
              name: "Ubuntu (GCC)",
              os: ubuntu-24.04,
              common_flags: "-DCMAKE_C_COMPILER=/usr/bin/gcc-16 \
                             -DCMAKE_CXX_COMPILER=/usr/bin/g++-16",
              debug_flags: "-DCMAKE_BUILD_TYPE=Debug",
              release_flags: "-DCMAKE_BUILD_TYPE=Release",
              build_flags: "",
              dependencies: "sudo apt update ; \
                             sudo apt install lsb-release wget software-properties-common ; \
                             sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test ; \
                             sudo apt update ; \
                             sudo apt install ninja-build gcc-16 g++-16 libgstreamer1.0-dev \
                                              libx11-dev libxrandr-dev libxext-dev libxcursor-dev xvfb",
              sdk: "/opt/ossia-sdk-x86_64",
              pre_build: ""
            }
          - {
              name: "macOS",
              os: macos-15,
              common_flags: "",
              debug_flags: "-DCMAKE_BUILD_TYPE=Debug",
              release_flags: "-DCMAKE_BUILD_TYPE=Release",
              build_flags: "",
              sdk: "/opt/ossia-sdk-aarch64",
              pre_build: "sudo xcode-select -s /Applications/Xcode_16.4.app"
            }

    steps:
      - name: Use GitHub mirror for Eigen submodule
        shell: bash
        run: |
          # score pins 3rdparty/eigen to gitlab.com, which is slow/flaky from
          # GitHub runners. The eigen-mirror/eigen GitHub repo preserves the same
          # commit SHAs, so redirect the submodule fetch there.
          git config --global url."https://github.com/eigen-mirror/eigen".insteadOf "https://gitlab.com/libeigen/eigen"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Checkout dependencies
        uses: actions/checkout@v7
        with:
          repository: ossia/score
          submodules: "recursive"
          path: score

      - name: Checkout Max SDK
        uses: actions/checkout@v7
        with:
          repository: jcelerier/max-sdk-base
          submodules: "recursive"
          path: max-sdk-base

      - name: Checkout TouchDesigner SDK
        uses: actions/checkout@v7
        with:
          repository: jcelerier/CustomOperatorSamples
          ref: add-pop-headers
          path: touchdesigner-sdk

      - name: Install Godot
        if: runner.os != 'Windows'
        uses: ./.github/actions/setup-godot

      - name: Install dependencies
        shell: bash
        run: |
          ${{ matrix.config.dependencies }}

      - name: Download SDK
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/ossia/score/master/tools/fetch-sdk.sh > fetch-sdk.sh
          chmod +x ./fetch-sdk.sh
          ./fetch-sdk.sh

      - name: Build debug
        shell: bash
        run: |
          mkdir build-debug
          cd build-debug

          if [[ "${{ matrix.config.path }}" != "" ]]; then
            export PATH="${{ matrix.config.path }}:$PATH"
          fi

          export MAX_SDK=$PWD/../max-sdk-base
          export TD_SDK=$PWD/../touchdesigner-sdk
          export SDK_3RDPARTY=$PWD/../score/3rdparty
          export VERBOSE=1

          ${{ matrix.config.pre_build }}

          cmake .. \
            -DBUILD_TESTING=1 \
            -DBOOST_ROOT=${{ matrix.config.sdk }}/boost \
            -Dpybind11_DIR=$SDK_3RDPARTY/libossia/3rdparty/pybind11 \
            -DAVND_MAXSDK_PATH=$MAX_SDK \
            -DTOUCHDESIGNER_SDK_PATH=$TD_SDK \
            -DVST3_SDK_ROOT=$SDK_3RDPARTY/vst3 \
            -DCMAKE_PREFIX_PATH="$SDK_3RDPARTY/libpd/pure-data/src" \
            ${{ matrix.config.common_flags }} \
            ${{ matrix.config.debug_flags }}

          cmake --build . -- ${{ matrix.config.build_flags }}

      - name: Test debug
        shell: bash
        run: |
          cd build-debug

          if [[ "${{ matrix.config.path }}" != "" ]]; then
            export PATH="${{ matrix.config.path }}:$PATH"
          fi

          # The editor tests open real windows: give them an X server.
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a -s "-screen 0 1280x960x24" cmake --build . --target test
          else
            cmake --build . --target test
          fi

      - name: Build release
        shell: bash
        run: |
          mkdir build-release
          cd build-release

          if [[ "${{ matrix.config.path }}" != "" ]]; then
            export PATH="${{ matrix.config.path }}:$PATH"
          fi

          export MAX_SDK=$PWD/../max-sdk-base
          export TD_SDK=$PWD/../touchdesigner-sdk
          export SDK_3RDPARTY=$PWD/../score/3rdparty
          export VERBOSE=1

          ${{ matrix.config.pre_build }}

          cmake .. \
            -DBUILD_TESTING=1 \
            -DBOOST_ROOT=${{ matrix.config.sdk }}/boost \
            -Dpybind11_DIR=$SDK_3RDPARTY/libossia/3rdparty/pybind11 \
            -DAVND_MAXSDK_PATH=$MAX_SDK \
            -DTOUCHDESIGNER_SDK_PATH=$TD_SDK \
            -DVST3_SDK_ROOT=$SDK_3RDPARTY/vst3 \
            -DCMAKE_PREFIX_PATH="$SDK_3RDPARTY/libpd/pure-data/src;$SDK_3RDPARTY/libossia/3rdparty/pybind11" \
            ${{ matrix.config.common_flags }} \
            ${{ matrix.config.release_flags }}

          cmake --build . -- ${{ matrix.config.build_flags }}

      - name: Test release
        shell: bash
        run: |
          cd build-release

          if [[ "${{ matrix.config.path }}" != "" ]]; then
            export PATH="${{ matrix.config.path }}:$PATH"
          fi

          # The editor tests open real windows: give them an X server.
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            xvfb-run -a -s "-screen 0 1280x960x24" cmake --build . --target test
          else
            cmake --build . --target test
          fi
