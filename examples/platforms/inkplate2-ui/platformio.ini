; Avendish soft UI on a Soldered Inkplate 2 (ESP32 WROVER + 212x104
; black/white/red e-paper). See README.md.
;
; Required environment variables (absolute paths):
;   AVND_INCLUDE     <avendish>/include
;   AVND_NUKLEAR     dir containing nuklear.h
;   AVND_CANVAS_ITY  dir containing canvas_ity.hpp
;   BOOST_ROOT       boost headers (mp11 & pfr are used)
;   MAGIC_ENUM       magic_enum include dir
;
; The pioarduino platform provides Arduino core 3.x with a C++23-capable
; GCC; the stock espressif32 platform's GCC 8 cannot build avendish.

[env:inkplate2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.embed_files = src/font.ttf
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_flags =
  -std=gnu++23
  -I${sysenv.AVND_INCLUDE}
  -I${sysenv.AVND_NUKLEAR}
  -I${sysenv.AVND_CANVAS_ITY}
  -I${sysenv.BOOST_ROOT}
  -I${sysenv.MAGIC_ENUM}
